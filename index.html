<!DOCTYPE html>

<title>Revision</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; color: #000; }
  .screen { display: none; }
  .screen.active { display: block; }
  h2 { padding: 12px; margin: 0; font-size: 20px; border-bottom: 1px solid #ccc; }
  button { font-size: 18px; padding: 16px; width: 100%; display: block; margin: 8px 0;
           border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; }
  button:active { background: #eee; }
  .back { width: auto; padding: 10px 16px; background: #f0f0f0; font-size: 15px; }
  .top-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #ddd; }
  .top-bar span { font-size: 15px; font-weight: bold; flex: 1; }
  .counter { font-size: 13px; color: #888; white-space: nowrap; }

  /* Image section label */
  .img-label { padding: 7px 12px; font-weight: bold; font-size: 14px;
               border-top: 1px solid #ccc; border-bottom: 1px solid #ccc;
               background: #f5f5f5; display: flex; align-items: center; justify-content: space-between; }
  .img-label.sir { background: #fff8e1; }

  /* Image counter inside section e.g. 1/3 */
  .sec-counter { font-size: 12px; color: #888; font-weight: normal; }

  /* Scroll row for multiple images */
  .img-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .img-scroll img { min-width: 100%; width: 100%; scroll-snap-align: start;
                    display: block; touch-action: pinch-zoom; flex-shrink: 0; }
  .no-img { padding: 24px; text-align: center; color: #aaa;
            border: 2px dashed #ddd; margin: 8px 12px; border-radius: 8px; font-size: 14px; }

  /* Dot indicators */
  .dots { display: flex; justify-content: center; gap: 6px; padding: 8px 0; background: #fafafa; border-bottom: 1px solid #eee; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: background 0.2s; }
  .dot.on { background: #333; }

  .nav-row { display: flex; gap: 8px; padding: 10px; }
  .nav-row button { flex: 1; width: auto; text-align: center; font-size: 20px; }
  #home-list, #q-list { padding: 12px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h2>📚 Revision</h2>
  <div id="home-list"></div>
</div>

<!-- TOPIC -->
<div id="topic" class="screen">
  <div class="top-bar">
    <button class="back" onclick="go('home')">← Back</button>
    <span id="topic-title"></span>
  </div>
  <div id="q-list"></div>
</div>

<!-- IMAGE VIEW -->
<div id="imageview" class="screen">
  <div class="top-bar">
    <button class="back" onclick="go('topic')">← List</button>
    <span id="img-title"></span>
    <span class="counter" id="img-counter"></span>
  </div>

  <!-- My notes section -->
  <div class="img-label">
    📓 My Notes
    <span class="sec-counter" id="my-sec-counter"></span>
  </div>
  <div class="img-scroll" id="my-scroll"></div>
  <div class="dots" id="my-dots"></div>

  <!-- Sir notes section -->
  <div class="img-label sir">
    📖 Sir Notes
    <span class="sec-counter" id="sir-sec-counter"></span>
  </div>
  <div class="img-scroll" id="sir-scroll"></div>
  <div class="dots" id="sir-dots"></div>

  <div class="nav-row">
    <button id="prev-btn" onclick="changeQ(-1)">◀ Prev</button>
    <button id="next-btn" onclick="changeQ(1)">Next ▶</button>
  </div>
</div>

<script>
let curTopic = 0, curQ = 0;

function go(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
  window.scrollTo(0, 0);
}

// Build home buttons
document.getElementById('home-list').innerHTML =
  TOPICS.map((t, i) =>
    `<button onclick="openTopic(${i})">${t.name} <span style="color:#aaa;font-size:14px">(${t.questions.length} questions)</span></button>`
  ).join('');

function openTopic(i) {
  curTopic = i;
  document.getElementById('topic-title').textContent = TOPICS[i].name;
  document.getElementById('q-list').innerHTML =
    TOPICS[i].questions.map((q, j) =>
      `<button onclick="openImage(${j})">
        <span style="font-family:monospace;font-size:12px;background:#eee;padding:2px 8px;border-radius:4px;margin-right:10px">Q${j+1}</span>
        ${q.label}
      </button>`
    ).join('');
  go('topic');
}

function openImage(j) {
  curQ = j;
  renderImage();
  go('imageview');
}

function buildScrollSection(scrollId, dotsId, counterId, imgs) {
  const scrollEl = document.getElementById(scrollId);
  const dotsEl = document.getElementById(dotsId);
  const counterEl = document.getElementById(counterId);

  if (!imgs || imgs.length === 0) {
    scrollEl.innerHTML = `<div class="no-img" style="min-width:100%">No image yet — add path in HTML file</div>`;
    dotsEl.innerHTML = '';
    counterEl.textContent = '';
    return;
  }

  // Images
  scrollEl.innerHTML = imgs.map(src =>
    `<img src="${src}" alt="note">`
  ).join('');

  // Dots
  dotsEl.innerHTML = imgs.map((_, i) =>
    `<div class="dot ${i === 0 ? 'on' : ''}" id="${dotsId}-dot-${i}"></div>`
  ).join('');

  // Counter
  counterEl.textContent = imgs.length > 1 ? `1/${imgs.length}` : '';

  // Update dots and counter on scroll
  scrollEl.onscroll = () => {
    const idx = Math.round(scrollEl.scrollLeft / scrollEl.offsetWidth);
    dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === idx));
    if (imgs.length > 1) counterEl.textContent = `${idx + 1}/${imgs.length}`;
  };
}

function renderImage() {
  const t = TOPICS[curTopic];
  const q = t.questions[curQ];

  document.getElementById('img-title').textContent = `${t.name} — ${q.label}`;
  document.getElementById('img-counter').textContent = `${curQ + 1}/${t.questions.length}`;

  buildScrollSection('my-scroll', 'my-dots', 'my-sec-counter', q.my_img);
  buildScrollSection('sir-scroll', 'sir-dots', 'sir-sec-counter', q.sir_img);

  document.getElementById('prev-btn').disabled = curQ === 0;
  document.getElementById('next-btn').disabled = curQ === t.questions.length - 1;
}

function changeQ(d) {
  const total = TOPICS[curTopic].questions.length;
  curQ = Math.max(0, Math.min(total - 1, curQ + d));
  renderImage();
  window.scrollTo(0, 0);
}

// Swipe left/right on nav to change question
let tx = 0;
document.getElementById('imageview').addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive: true});
document.getElementById('imageview').addEventListener('touchend', e => {
  const diff = tx - e.changedTouches[0].clientX;
  // only trigger if not swiping inside a scroll section
  if (Math.abs(diff) > 80 && e.target.tagName !== 'IMG') changeQ(diff > 0 ? 1 : -1);
}, {passive: true});
</script>
